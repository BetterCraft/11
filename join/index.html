<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Room - LocalM</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="../assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1e1e1e;
            --card: rgba(37, 37, 37, 0.6);
            --green: #22c55e;
            --tx: #ffffff;
            --tx2: #a1a1aa;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Geist', system-ui, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #2a2a2a 0%, #1e1e1e 100%);
            color: var(--tx);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .logo {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .logo span { color: var(--green); }

        .title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--tx2);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px 0;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--green);
            color: #000;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-secondary {
            background: rgba(0, 0, 0, 0.3);
            color: var(--tx);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .divider {
            margin: 24px 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
            width: 100%;
        }
    </style>
</head>
<body>

    <script>
        const originalTitle = document.title;
        const originalFavicon = document.getElementById('favicon').href;
        
        // The "Away" assets
        const awayTitles = ["Hey! Come Back!", "Hey! Come Back!"];
        const awayFavicon = ["../assets/shock.png","../assets/worried.png"] // Replace with your "away" icon URL
        
        let titleInterval;

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 1. Logic for when the user LEAVES the tab
                let i = 0;
                // We cycle the titles every 2 seconds to grab attention
                titleInterval = setInterval(() => {
                    document.title = awayTitles[i % awayTitles.length];
                    // Change the favicon
                    document.getElementById('favicon').href = awayFavicon[i % awayFavicon.length];
                    i++;
                }, 2000);

                
                
            } else {
                // 2. Logic for when the user RETURNS to the tab
                clearInterval(titleInterval);
                document.title = originalTitle;
                document.getElementById('favicon').href = originalFavicon;
            }
        });
    </script>

    <div class="container">
        <div class="logo">LOCAL<span>M</span>.</div>
        
        <div class="spinner" id="spinner"></div>
        
        <div class="title" id="status-title">Joining Room...</div>
        <div class="subtitle" id="status-text">Your browser should prompt you to open LocalM. If nothing happens, click below.</div>
        
        <a href="#" id="btn-open" class="btn btn-primary" style="display:none;">Open in LocalM App</a>
        
        <div class="divider"></div>
        
        <div style="font-size: 12px; color: var(--tx2); margin-bottom: 12px; font-weight: 600;">Don't have the app installed?</div>
        <a href="https://github.com/LocalMiner/LOCALMP/releases/latest" class="btn btn-secondary">Download LocalM</a>
    </div>

    <script>
        // 1. Grab the ?code=XYZ from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('code');

        if (roomCode) {
            // 2. Format the Deep Link specifically for your protocol
            const deepLink = `localme://join/${roomCode}`;
            
            // 3. Set up the manual "Open" button just in case
            const openBtn = document.getElementById('btn-open');
            openBtn.href = deepLink;
            openBtn.style.display = 'inline-flex';

            // 4. Try to force the browser to open the app automatically
            setTimeout(() => {
                window.location.href = deepLink;
            }, 600); // 600ms delay so the page has time to render and the user sees the spinner
            
        } else {
            // Error handling if someone goes to the page without a room code
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status-title').innerText = 'Invalid Link';
            document.getElementById('status-title').style.color = '#ef4444'; // Red color
            document.getElementById('status-text').innerText = 'No room code was found. Please make sure you clicked a valid Discord invite link.';
        }
    </script>

</body>
</html>
